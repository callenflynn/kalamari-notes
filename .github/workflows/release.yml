name: Build and Release

on:
  push:
    branches:
      - '**'
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/release.yml'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  # ---------------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Compute version
        id: version
        shell: bash
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure
        run: cmake -S . -B build -A x64 -DKALAMARI_VERSION_SHA=${{ steps.version.outputs.sha }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package (CPack)
        working-directory: build
        run: cpack -C ${{ env.BUILD_TYPE }}

      - name: Find artifacts
        id: find
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path build -Filter "*.msi" | Select-Object -First 1
          $zip = Get-ChildItem -Path build -Filter "*.zip" | Select-Object -First 1
          echo "msi=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "zip=$($zip.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            build/*.msi
            build/*.zip

  # ---------------------------------------------------------------------------
  # macOS
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Compute version
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DKALAMARI_VERSION_SHA=${{ steps.version.outputs.sha }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package (CPack)
        working-directory: build
        run: cpack -C ${{ env.BUILD_TYPE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            build/*.dmg
            build/*.zip

  # ---------------------------------------------------------------------------
  # Linux
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxi-dev libxss-dev libwayland-dev \
            libxkbcommon-dev libgl1-mesa-dev libegl1-mesa-dev libdbus-1-dev \
            libpulse-dev libasound2-dev libpipewire-0.3-dev libcurl4-openssl-dev

      - name: Compute version
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DSDL_X11_XTEST=OFF -DKALAMARI_VERSION_SHA=${{ steps.version.outputs.sha }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package (CPack)
        working-directory: build
        run: cpack -C ${{ env.BUILD_TYPE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            build/*.deb
            build/*.rpm
            build/*.tar.gz

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Kalamari ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
